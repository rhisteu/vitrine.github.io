  <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    font-family: 'Inter', system-ui, sans-serif;
    background-color: #0d0015;
    color: #e5e7eb;
    overflow-x: hidden;
    font-size: 16px;
}

.font-display {
    font-family: 'Playfair Display', Georgia, serif;
}

.font-body {
    font-family: 'Inter', system-ui, sans-serif;
}

/* Animations */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideInLeft {
    from {
        opacity: 0;
        transform: translateX(-50px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

@keyframes scaleIn {
    from {
        opacity: 0;
        transform: scale(0.9);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes float {
    0%, 100% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-10px);
    }
}

@keyframes gradientShift {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

.animate-fade-in-up {
    animation: fadeInUp 0.8s ease-out forwards;
}

.animate-slide-in-left {
    animation: slideInLeft 0.8s ease-out forwards;
}

.animate-scale-in {
    animation: scaleIn 0.6s ease-out forwards;
}

.animate-float {
    animation: float 3s ease-in-out infinite;
}

.delay-100 { animation-delay: 0.1s; }
.delay-200 { animation-delay: 0.2s; }
.delay-300 { animation-delay: 0.3s; }
.delay-400 { animation-delay: 0.4s; }
.delay-500 { animation-delay: 0.5s; }
.delay-600 { animation-delay: 0.6s; }

.gradient-text {
    background: linear-gradient(135deg, #b366ff 0%, #9933ff 50%, #7700ff 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease infinite;
}

.glass-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.hover-lift {
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.hover-lift:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(179, 102, 255, 0.2);
}

.nav-link {
    position: relative;
    display: inline-block;
}

.nav-link::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, #b366ff, #7700ff);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.3s ease;
}

.nav-link:hover::after {
    transform: scaleX(1);
    transform-origin: left;
}

.bg-pattern {
    background-image: 
        radial-gradient(circle at 20% 80%, rgba(179, 102, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(153, 51, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(119, 0, 255, 0.08) 0%, transparent 40%);
}

.section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
}

::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: #0f0f1a;
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #b366ff, #7700ff);
    border-radius: 4px;
}

/* Layout */
#app-wrapper {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
}

header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

header .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

#site-title {
    font-size: 1.5rem;
    font-weight: bold;
    animation: fadeInUp 0.8s ease-out forwards;
}

nav {
    display: none;
}

@media (min-width: 768px) {
    nav {
        display: block;
    }
}

nav ul {
    display: flex;
    align-items: center;
    gap: 2rem;
    list-style: none;
}

nav a {
    font-size: 0.875rem;
    font-weight: 500;
    color: #d1d5db;
    text-decoration: none;
    padding: 0.5rem 0;
    transition: color 0.3s ease;
}

nav a:hover {
    color: white;
}

#mobile-menu-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: #d1d5db;
    cursor: pointer;
    width: 1.5rem;
    height: 1.5rem;
    transition: color 0.3s ease;
}

@media (min-width: 768px) {
    #mobile-menu-btn {
        display: none;
    }
}

#mobile-menu-btn:hover {
    color: white;
}

#mobile-menu {
    display: none;
    margin-top: 1rem;
    padding-bottom: 1rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    padding-top: 1rem;
}

#mobile-menu.hidden {
    display: none;
}

#mobile-menu ul {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    list-style: none;
}

#mobile-menu a {
    font-size: 0.875rem;
    font-weight: 500;
    color: #d1d5db;
    text-decoration: none;
    transition: color 0.3s ease;
}

#mobile-menu a:hover {
    color: white;
}

/* Hero Section */
.hero-section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 5rem;
    padding: 1.5rem;
    margin-top: 4rem;
}

.hero-content {
    max-width: 56rem;
    margin: 0 auto;
    text-align: center;
}

.hero-heading {
    font-size: 3rem;
    font-weight: bold;
    margin-bottom: 1.5rem;
    animation: fadeInUp 0.8s ease-out forwards;
}

@media (min-width: 768px) {
    .hero-heading {
        font-size: 4.5rem;
    }
}

.hero-subtitle {
    font-size: 1.25rem;
    color: #9ca3af;
    margin-bottom: 2rem;
    animation: fadeInUp 0.8s ease-out forwards;
    animation-delay: 0.1s;
}

.cta-buttons {
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    animation: fadeInUp 0.8s ease-out forwards;
    animation-delay: 0.2s;
}

.btn {
    padding: 0.75rem 2rem;
    border-radius: 9999px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: all 0.3s ease;
    display: inline-block;
    text-align: center;
}

.btn-primary {
    background: linear-gradient(to right, #9933ff, #b366ff);
    color: white;
}

.btn-primary:hover {
    box-shadow: 0 0 20px rgba(153, 51, 255, 0.5);
    transform: translateY(-0.25rem);
}

.btn-secondary {
    background: none;
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}

.btn-secondary:hover {
    background-color: rgba(255, 255, 255, 0.1);
    transform: translateY(-0.25rem);
}

/* Sections */
section {
    padding: 6rem 1.5rem;
}

.section-container {
    max-width: 1200px;
    margin: 0 auto;
}

h2 {
    font-size: 2.25rem;
    font-weight: bold;
    margin-bottom: 3rem;
    text-align: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    margin-bottom: 4rem;
}

/* Contact Section */
.contact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
}

@media (min-width: 768px) {
    .contact-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

.contact-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 1rem;
    padding: 2rem;
    text-align: center;
    text-decoration: none;
    color: inherit;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: block;
}

.contact-card:hover {
    transform: translateY(-2rem);
    box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
}

.contact-icon {
    width: 4rem;
    height: 4rem;
    margin: 0 auto 1rem;
    border-radius: 50%;
    background: linear-gradient(to bottom right, #b366ff, #7700ff);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
}

.contact-card:hover .contact-icon {
    transform: scale(1.1);
}

.contact-icon svg {
    width: 2rem;
    height: 2rem;
    color: white;
}

.contact-title {
    font-size: 1.125rem;
    font-weight: 600;
    color: white;
    margin-bottom: 0.5rem;
}

.contact-info {
    font-size: 0.875rem;
    color: #9ca3af;
    word-break: break-all;
}

/* Footer */
footer {

}

footer p {

}
